<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qank & Lucy Notes - Cloud Canvas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Dancing+Script:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&family=Space+Mono&family=Montserrat:wght@400;800&family=Pacifico&family=Bitter:wght@400;700&family=Lora:ital,wght@0,400;1,700&family=Oswald:wght@300;600&family=Roboto+Slab:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-mint: #10b981;
            --font-global: 'Quicksand', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: var(--font-global);
            background-color: #f8fafc;
            user-select: none;
        }

        /* Canvas Styles */
        #canvas-viewport {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background-image: radial-gradient(#e2e8f0 1.2px, transparent 1.2px);
            background-size: 40px 40px;
            cursor: grab;
            touch-action: none;
        }

        #canvas-viewport:active { cursor: grabbing; }

        #canvas-content {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            will-change: transform;
        }

        /* Note Cards */
        .note-card {
            position: absolute;
            width: 280px;
            min-height: 120px;
            border-radius: 1.25rem;
            padding: 1.25rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: default;
            display: flex;
            flex-direction: column;
            border: 2px solid transparent;
            backdrop-filter: blur(8px);
        }

        .note-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .note-header {
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            opacity: 0.6;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Themes */
        .note-mint { background: rgba(236, 253, 245, 0.95); border-color: #6ee7b7; color: #064e3b; }
        .note-pink { background: rgba(255, 241, 242, 0.95); border-color: #fda4af; color: #881337; }
        .note-blue { background: rgba(239, 246, 255, 0.95); border-color: #93c5fd; color: #1e3a8a; }
        .note-yellow { background: rgba(254, 252, 232, 0.95); border-color: #fde047; color: #713f12; }
        .note-lavender { background: rgba(245, 243, 255, 0.95); border-color: #c4b5fd; color: #4c1d95; }
        .note-sky { background: rgba(240, 249, 255, 0.95); border-color: #7dd3fc; color: #0c4a6e; }
        .note-charcoal { background: rgba(31, 41, 55, 0.95); border-color: #4b5563; color: #f3f4f6; }
        .note-coral { background: rgba(255, 245, 242, 0.95); border-color: #fda4af; color: #9f1239; }

        @keyframes float-heart {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.7; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        .heart-particle {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            animation: float-heart 8s linear infinite;
        }

        .glass-sidebar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.3);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Notification Box */
        #notification-box {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 9999;
            transform: translateY(200%);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #notification-box.show { transform: translateY(0); }
    </style>
</head>
<body class="bg-slate-50">

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="fixed inset-0 z-[5000] flex items-center justify-center bg-emerald-50 transition-opacity duration-500">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center border border-emerald-100">
            <div class="w-20 h-20 bg-emerald-500 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-emerald-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C10 14.52 12 13 13 12"/></svg>
            </div>
            <h1 class="text-3xl font-bold text-slate-800 mb-2">Qank & Lucy Notes</h1>
            <p class="text-slate-500 mb-8 text-sm italic">"You may be out of my sight, but you're all I see"</p>
            
            <div class="space-y-4">
                <!-- Google Login -->
                <button onclick="handleGoogleLogin()" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-100 py-3.5 rounded-2xl font-bold text-slate-700 hover:bg-slate-50 transition-all shadow-sm active:scale-95">
                    <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Tiếp tục với Google
                </button>

                <div class="flex items-center gap-4 py-2">
                    <div class="h-[1px] bg-slate-100 flex-grow"></div>
                    <span class="text-xs font-bold text-slate-300 uppercase">Hoặc</span>
                    <div class="h-[1px] bg-slate-100 flex-grow"></div>
                </div>

                <!-- Guest Login -->
                <input type="text" id="username-input" placeholder="Tên khách của bạn..." class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-emerald-400 transition-all text-center font-semibold text-slate-700">
                <button onclick="handleGuestLogin()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold hover:bg-emerald-700 shadow-xl shadow-emerald-100 transition-all transform active:scale-95">
                    Vào với tư cách Khách
                </button>
            </div>
        </div>
    </div>

    <!-- UI Layer -->
    <div id="app-shell" class="hidden">
        
        <button id="sidebar-open" onclick="toggleSidebar(true)" class="fixed top-6 left-6 z-[1001] w-12 h-12 bg-white rounded-2xl shadow-lg flex items-center justify-center text-emerald-600 hover:scale-110 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>

        <aside id="sidebar" class="fixed top-0 left-0 h-full w-80 glass-sidebar z-[1010] p-8 shadow-2xl transition-transform duration-500 -translate-x-full overflow-y-auto">
            <div class="flex items-center justify-between mb-10">
                <div class="flex items-center gap-3">
                    <div id="user-avatar-container" class="w-10 h-10 rounded-xl bg-emerald-500 overflow-hidden flex items-center justify-center text-white font-bold text-lg">
                        <span id="user-initial">Q</span>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase font-bold text-slate-400 tracking-tighter">Thành viên</p>
                        <p id="user-name-display" class="text-sm font-bold text-slate-700 truncate max-w-[120px]">User</p>
                    </div>
                </div>
                <button onclick="toggleSidebar(false)" class="p-2 hover:bg-slate-100 rounded-lg text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
            </div>

            <div class="space-y-8">
                <section>
                    <label class="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest block mb-4">Chủ đề Canvas</label>
                    <div class="grid grid-cols-4 gap-3">
                        <button onclick="setTheme('default')" class="aspect-square rounded-xl bg-slate-100 border-2 border-white shadow-sm hover:scale-105 transition-transform flex items-center justify-center">☁️</button>
                        <button onclick="setTheme('love')" class="aspect-square rounded-xl bg-rose-100 border-2 border-white shadow-sm hover:scale-105 transition-transform flex items-center justify-center">💖</button>
                        <button onclick="setTheme('dark')" class="aspect-square rounded-xl bg-slate-800 border-2 border-white shadow-sm hover:scale-105 transition-transform flex items-center justify-center text-xs">✨</button>
                        <button onclick="setTheme('pitch')" class="aspect-square rounded-xl bg-green-600 border-2 border-white shadow-sm hover:scale-105 transition-transform flex items-center justify-center text-xs">⚽</button>
                    </div>
                </section>

                <section>
                    <label class="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest block mb-4">Phông chữ toàn cục</label>
                    <select onchange="setGlobalFont(this.value)" class="w-full p-3 bg-slate-50 rounded-xl border-none outline-none focus:ring-2 focus:ring-emerald-200 text-sm font-medium">
                        <option value="Quicksand">Quicksand (Tròn trịa)</option>
                        <option value="Montserrat">Montserrat (Mạnh mẽ)</option>
                        <option value="Dancing Script">Dancing Script (Viết tay)</option>
                        <option value="Pacifico">Pacifico (Phóng khoáng)</option>
                        <option value="Playfair Display">Playfair (Sang trọng)</option>
                        <option value="Space Mono">Space Mono (Code)</option>
                    </select>
                </section>

                <section>
                    <label class="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest block mb-4">Thu phóng: <span id="zoom-percent" class="text-emerald-600">100%</span></label>
                    <div class="flex items-center gap-3 bg-slate-50 p-2 rounded-2xl">
                        <button onclick="adjustZoom(-0.1)" class="w-10 h-10 flex items-center justify-center bg-white rounded-xl shadow-sm hover:text-emerald-500 font-bold">-</button>
                        <input type="range" min="0.2" max="2" step="0.1" value="1" id="zoom-range" class="flex-grow accent-emerald-500" oninput="applyZoom(this.value)">
                        <button onclick="adjustZoom(0.1)" class="w-10 h-10 flex items-center justify-center bg-white rounded-xl shadow-sm hover:text-emerald-500 font-bold">+</button>
                    </div>
                </section>

                <button onclick="openEditor()" class="w-full bg-emerald-600 text-white py-5 rounded-3xl font-bold shadow-xl shadow-emerald-200 hover:-translate-y-1 hover:bg-emerald-700 active:scale-95 transition-all">
                    + Tạo Ghi Chú Mới
                </button>

                <button onclick="handleLogout()" class="w-full bg-slate-100 text-slate-500 py-3 rounded-2xl font-bold text-sm hover:bg-slate-200 transition-all mt-4">
                    Đăng xuất
                </button>

                <div class="pt-10 opacity-30 text-[10px] text-center font-bold uppercase tracking-[0.2em]">
                    Qank & Lucy Notes v2.1
                </div>
            </div>
        </aside>

        <main id="canvas-viewport">
            <div id="particle-container"></div>
            <div id="canvas-content"></div>
        </main>

        <div id="editor-modal" class="fixed inset-0 z-[6000] hidden items-center justify-center p-6 backdrop-blur-md bg-slate-900/40">
            <div class="bg-white rounded-[2.5rem] w-full max-w-xl p-8 shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-slate-800">Cài đặt Ghi chú</h2>
                    <button onclick="closeEditor()" class="text-slate-400 hover:text-slate-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>

                <div class="flex-grow overflow-y-auto space-y-6 pr-2">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Màu sắc</label>
                            <div class="flex flex-wrap gap-2" id="color-selectors"></div>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Phông chữ</label>
                            <select id="editor-font" class="w-full p-2 bg-slate-50 rounded-xl text-sm outline-none border-none">
                                <option value="inherit">Mặc định</option>
                                <option value="Quicksand">Quicksand</option>
                                <option value="Montserrat">Montserrat</option>
                                <option value="Dancing Script">Dancing Script</option>
                                <option value="Pacifico">Pacifico</option>
                                <option value="Space Mono">Space Mono</option>
                            </select>
                        </div>
                    </div>

                    <input type="text" id="editor-title" placeholder="Tiêu đề..." class="w-full text-2xl font-bold outline-none border-b-2 border-slate-50 focus:border-emerald-200 pb-2">
                    <textarea id="editor-content" placeholder="Nội dung ghi chú..." class="w-full min-h-[120px] outline-none text-slate-600 resize-none leading-relaxed" spellcheck="false"></textarea>

                    <div class="space-y-4 pt-4 border-t border-slate-50">
                        <div class="flex items-center gap-3 text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                            <input type="text" id="editor-image" placeholder="Link ảnh (URL)..." class="flex-grow text-xs outline-none bg-transparent">
                        </div>
                        <div class="flex items-center gap-3 text-emerald-500">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg>
                            <input type="text" id="editor-spotify" placeholder="Link Spotify..." class="flex-grow text-xs outline-none bg-transparent">
                        </div>
                    </div>
                </div>

                <div class="mt-8 flex gap-3">
                    <button onclick="closeEditor()" class="flex-1 py-4 font-bold text-slate-400 hover:text-slate-600">Hủy</button>
                    <button onclick="handleSave()" class="flex-[2] bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-xl hover:bg-slate-800 transition-all">Lưu Ghi Chú</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification UI -->
    <div id="notification-box" class="bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 border border-white/10">
        <span id="notification-message" class="text-sm font-medium"></span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config - SỬ DỤNG CẤU HÌNH HỆ THỐNG ĐỂ TRÁNH LỖI DOMAIN
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // App ID dùng để phân tách dữ liệu trong Firestore
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'qanklucynotes';

        // State ứng dụng
        let user = null;
        let scale = 1;
        let posX = window.innerWidth / 2 - 140;
        let posY = window.innerHeight / 2 - 100;
        let isPanning = false;
        let startX, startY;
        let activeEditorNoteId = null;
        let selectedColor = 'mint';
        let customDisplayName = "";

        const COLORS = [
            { id: 'mint', hex: '#6ee7b7' }, { id: 'pink', hex: '#fda4af' },
            { id: 'blue', hex: '#93c5fd' }, { id: 'yellow', hex: '#fde047' },
            { id: 'lavender', hex: '#c4b5fd' }, { id: 'sky', hex: '#7dd3fc' },
            { id: 'coral', hex: '#fb7185' }, { id: 'charcoal', hex: '#374151' }
        ];

        // --- Notifications ---
        function showNotification(msg) {
            const box = document.getElementById('notification-box');
            document.getElementById('notification-message').innerText = msg;
            box.classList.add('show');
            setTimeout(() => box.classList.remove('show'), 4000);
        }

        // --- Authentication ---

        window.handleGoogleLogin = async () => {
            const provider = new GoogleAuthProvider();
            try {
                // Thử đăng nhập Google. Nếu bị chặn domain, thông báo cho người dùng.
                await signInWithPopup(auth, provider);
            } catch (err) {
                console.error("Google Auth error:", err);
                if (err.code === 'auth/unauthorized-domain') {
                    showNotification("Lỗi: Domain này chưa được cấp phép trong Firebase của bạn. Hãy sử dụng đăng nhập Khách.");
                } else if (err.code === 'auth/cancelled-popup-request') {
                    // Cửa sổ đóng lại, không làm gì cả
                } else {
                    showNotification("Có lỗi xảy ra: " + err.message);
                }
            }
        };

        window.handleGuestLogin = async () => {
            customDisplayName = document.getElementById('username-input').value.trim() || "Khách";
            try {
                // MANDATORY RULE 3: Thử Custom Token trước, nếu không có mới dùng Anonymous
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Guest Auth error:", err);
                if (err.code === 'auth/admin-restricted-operation') {
                    showNotification("Lỗi: Đăng nhập ẩn danh chưa được bật trong Firebase Console.");
                } else {
                    showNotification("Có lỗi đăng nhập: " + err.message);
                }
            }
        };

        window.handleLogout = () => {
            signOut(auth).then(() => {
                window.location.reload();
            });
        };

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                document.getElementById('auth-overlay').classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('app-shell').classList.remove('hidden');
                
                const finalName = u.displayName || customDisplayName || "Thành viên";
                document.getElementById('user-name-display').innerText = finalName;
                
                if (u.photoURL) {
                    document.getElementById('user-avatar-container').innerHTML = `<img src="${u.photoURL}" class="w-full h-full object-cover">`;
                } else {
                    document.getElementById('user-initial').innerText = finalName[0].toUpperCase();
                }
                
                // Bắt đầu đồng bộ dữ liệu sau khi đăng nhập thành công
                startSync();
                updateTransform();
            } else {
                document.getElementById('auth-overlay').classList.remove('opacity-0', 'pointer-events-none');
                document.getElementById('app-shell').classList.add('hidden');
            }
        });

        // --- Canvas Engine ---

        const viewport = document.getElementById('canvas-viewport');
        const content = document.getElementById('canvas-content');

        viewport.addEventListener('mousedown', (e) => {
            if (e.target === viewport || e.target === content) {
                isPanning = true;
                startX = e.clientX - posX;
                startY = e.clientY - posY;
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isPanning) {
                posX = e.clientX - startX;
                posY = e.clientY - startY;
                updateTransform();
            }
        });

        window.addEventListener('mouseup', () => isPanning = false);
        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            applyZoom(scale + (e.deltaY > 0 ? -0.1 : 0.1));
        }, { passive: false });

        function updateTransform() {
            content.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        window.applyZoom = (val) => {
            scale = Math.min(Math.max(0.15, parseFloat(val)), 3);
            document.getElementById('zoom-percent').innerText = Math.round(scale * 100) + '%';
            document.getElementById('zoom-range').value = scale;
            updateTransform();
        };

        window.adjustZoom = (delta) => applyZoom(scale + delta);

        // --- Firestore Operations ---

        // MANDATORY RULE 1: Sử dụng đường dẫn chuẩn của hệ thống
        const notesRef = collection(db, 'artifacts', appId, 'public', 'data', 'notes');

        function startSync() {
            if (!user) return; // Bảo vệ truy vấn Firestore (Rule 3)
            
            onSnapshot(notesRef, (snapshot) => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === 'added' || change.type === 'modified') renderNote(change.doc.id, change.doc.data());
                    if (change.type === 'removed') document.getElementById(`note-${change.doc.id}`)?.remove();
                });
            }, (err) => {
                console.error("Firestore sync error:", err);
                showNotification("Lỗi đồng bộ dữ liệu. Hãy kiểm tra lại phân quyền Firestore.");
            });
        }

        function renderNote(id, data) {
            let el = document.getElementById(`note-${id}`);
            const isNew = !el;
            if (isNew) {
                el = document.createElement('div');
                el.id = `note-${id}`;
                el.className = 'note-card';
                content.appendChild(el);
            }

            el.dataset.id = id;
            el.dataset.title = data.title || "";
            el.dataset.content = data.content || "";
            el.dataset.image = data.image || "";
            el.dataset.spotify = data.spotify || "";
            el.dataset.font = data.font || "inherit";
            el.dataset.color = data.color || "mint";

            el.className = `note-card note-${data.color || 'mint'}`;
            el.style.left = `${data.x}px`;
            el.style.top = `${data.y}px`;
            el.style.fontFamily = data.font === 'inherit' ? 'var(--font-global)' : `'${data.font}', sans-serif`;

            let spotifyEmbed = "";
            if (data.spotify && data.spotify.includes('spotify.com')) {
                const parts = data.spotify.split('/');
                const idPart = parts.pop().split('?')[0];
                const typePart = parts.pop();
                spotifyEmbed = `<iframe src="https://open.spotify.com/embed/${typePart}/${idPart}" width="100%" height="80" frameBorder="0" allowtransparency="true" allow="encrypted-media" class="rounded-xl mt-3"></iframe>`;
            }

            el.innerHTML = `
                <div class="note-header" id="handle-${id}">
                    <span class="truncate pr-2">${data.author || 'Thành viên'}</span>
                    <button class="delete-btn hover:text-red-500 transition-colors flex-shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <div class="note-body cursor-pointer" onclick="window.openEditor('${id}')">
                    ${data.title ? `<h3 class="font-bold text-lg mb-1 leading-tight">${data.title}</h3>` : ''}
                    ${data.content ? `<p class="text-sm opacity-90 whitespace-pre-wrap">${data.content}</p>` : ''}
                    ${data.image ? `<img src="${data.image}" class="w-full h-auto rounded-xl mt-3 object-cover max-h-48 border border-black/5 shadow-sm" onerror="this.remove()">` : ''}
                    ${spotifyEmbed}
                </div>
                <div class="mt-4 pt-2 border-t border-black/5 flex justify-between items-center text-[8px] font-bold opacity-30 uppercase tracking-widest pointer-events-none">
                    <span>${data.updatedAt ? new Date(data.updatedAt.seconds * 1000).toLocaleDateString('vi-VN') : 'Mới'}</span>
                    <span class="edit-hint italic">Chạm để sửa</span>
                </div>
            `;

            el.querySelector('.delete-btn').onclick = (e) => {
                e.stopPropagation();
                if (!user) return;
                deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'notes', id));
            };

            if (isNew) makeDraggable(el, id);
        }

        function makeDraggable(el, id) {
            const handle = el.querySelector('.note-header');
            let dx = 0, dy = 0, isDragging = false;
            
            const onStart = (e) => {
                const cx = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                const cy = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                isDragging = true;
                const rect = el.getBoundingClientRect();
                dx = (cx - rect.left) / scale; dy = (cy - rect.top) / scale;
                el.style.zIndex = 1000;
                e.stopPropagation();
            };

            const onMove = (e) => {
                if (!isDragging) return;
                const cx = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                const cy = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                el.style.left = `${(cx - posX) / scale - dx}px`;
                el.style.top = `${(cy - posY) / scale - dy}px`;
            };

            const onEnd = async () => {
                if (!isDragging) return;
                isDragging = false; el.style.zIndex = 'auto';
                if (!user) return;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'notes', id), { 
                    x: parseFloat(el.style.left), y: parseFloat(el.style.top), updatedAt: serverTimestamp() 
                }, { merge: true });
            };

            handle.addEventListener('mousedown', onStart);
            handle.addEventListener('touchstart', onStart, { passive: false });
            window.addEventListener('mousemove', onMove);
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('mouseup', onEnd);
            window.addEventListener('touchend', onEnd);
        }

        // --- Editor ---

        window.openEditor = async (id = null) => {
            activeEditorNoteId = id;
            const modal = document.getElementById('editor-modal');
            const el = id ? document.getElementById(`note-${id}`) : null;
            
            document.getElementById('editor-title').value = el?.dataset.title || "";
            document.getElementById('editor-content').value = el?.dataset.content || "";
            document.getElementById('editor-image').value = el?.dataset.image || "";
            document.getElementById('editor-spotify').value = el?.dataset.spotify || "";
            document.getElementById('editor-font').value = el?.dataset.font || "inherit";
            selectedColor = el?.dataset.color || 'mint';

            updateColorPickers();
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        };

        window.closeEditor = () => {
            document.getElementById('editor-modal').classList.add('hidden');
            activeEditorNoteId = null;
        };

        window.handleSave = async () => {
            const title = document.getElementById('editor-title').value;
            const contentText = document.getElementById('editor-content').value;
            const image = document.getElementById('editor-image').value;
            const spotify = document.getElementById('editor-spotify').value;
            const font = document.getElementById('editor-font').value;
            const author = document.getElementById('user-name-display').innerText;

            if (!user) return;
            if (!title && !contentText && !image && !spotify) return closeEditor();
            
            const noteId = activeEditorNoteId || Math.random().toString(36).substring(2, 15);
            const noteData = { 
                title, 
                content: contentText, 
                image, 
                spotify, 
                font, 
                color: selectedColor, 
                author, 
                updatedAt: serverTimestamp() 
            };

            if (!activeEditorNoteId) {
                noteData.x = (-posX + window.innerWidth / 2) / scale - 140;
                noteData.y = (-posY + window.innerHeight / 2) / scale - 100;
                noteData.createdAt = serverTimestamp();
            }
            
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'notes', noteId), noteData, { merge: true });
            closeEditor();
        };

        // --- UI Interactions ---

        window.toggleSidebar = (show) => {
            document.getElementById('sidebar').style.transform = show ? 'translateX(0)' : 'translateX(-100%)';
            document.getElementById('sidebar-open').style.opacity = show ? '0' : '1';
        };

        window.setTheme = (theme) => {
            const bg = document.getElementById('canvas-viewport');
            const pc = document.getElementById('particle-container');
            pc.innerHTML = '';
            
            if (theme === 'love') {
                bg.style.background = '#fff1f2'; bg.style.backgroundImage = 'none';
                for(let i=0; i<20; i++) {
                    const p = document.createElement('div'); p.className = 'heart-particle'; p.innerHTML = '❤️';
                    p.style.left = Math.random()*100+'vw'; p.style.fontSize = (Math.random()*20+10)+'px'; p.style.animationDelay = Math.random()*5+'s';
                    pc.appendChild(p);
                }
            } else if (theme === 'dark') {
                bg.style.background = '#0f172a'; bg.style.backgroundImage = 'radial-gradient(#334155 1px, transparent 1px)';
            } else if (theme === 'pitch') {
                bg.style.background = '#15803d'; bg.style.backgroundImage = 'linear-gradient(rgba(255,255,255,0.1) 2px, transparent 2px), linear-gradient(90deg, rgba(255,255,255,0.1) 2px, transparent 2px)'; bg.style.backgroundSize = '100px 100px';
            } else {
                bg.style.background = '#f8fafc'; bg.style.backgroundImage = 'radial-gradient(#e2e8f0 1.2px, transparent 1.2px)'; bg.style.backgroundSize = '40px 40px';
            }
        };

        window.setGlobalFont = (f) => document.documentElement.style.setProperty('--font-global', `'${f}', sans-serif`);

        function updateColorPickers() {
            const container = document.getElementById('color-selectors');
            if (!container) return;
            container.innerHTML = '';
            COLORS.forEach(c => {
                const btn = document.createElement('button');
                btn.className = `w-8 h-8 rounded-full border-2 transition-all ${selectedColor === c.id ? 'border-emerald-500 scale-110' : 'border-white'}`;
                btn.style.backgroundColor = c.hex;
                btn.onclick = () => { selectedColor = c.id; updateColorPickers(); };
                container.appendChild(btn);
            });
        }
        
        updateColorPickers();
    </script>
</body>
</html>
